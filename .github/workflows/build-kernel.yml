name: Build Creek Kernel with KernelSU-Next and SUSFS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y git make bc bison flex libssl-dev build-essential wget zip

    - name: Get KernelSU-Next
      run: git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git

    - name: Get SUSFS
      run: git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git

    - name: Apply SUSFS patch
      run: |
        cd susfs4ksu
        if [ -f kernel_patches/5.15/0001-susfs.patch ]; then
          patch -p1 -d ${{ github.workspace }} < kernel_patches/5.15/0001-susfs.patch
        fi

    - name: Build kernel
      run: |
        export ARCH=arm64
        make ARCH=arm64 defconfig
        scripts/config --file .config -e KSU
        scripts/config --file .config -e KSU_SUSFS
        make -j2

    - name: Create AnyKernel3 zip
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp arch/arm64/boot/Image.gz AnyKernel3/
        cd AnyKernel3
        echo 'kernel.string=Creek Kernel with KSU-Next + SUSFS by kusonekoworld-max' > anykernel.sh
        echo 'do.devicecheck=0' >> anykernel.sh
        echo 'do.modules=0' >> anykernel.sh
        echo 'do.systemless=1' >> anykernel.sh
        echo 'do.cleanup=1' >> anykernel.sh
        echo 'device.name1=creek' >> anykernel.sh
        echo 'block=auto' >> anykernel.sh
        echo 'is_slot_device=auto' >> anykernel.sh
        echo '' >> anykernel.sh
        echo '. tools/ak3-core.sh' >> anykernel.sh
        echo 'dump_boot' >> anykernel.sh
        echo 'write_boot' >> anykernel.sh
        zip -r9 ../kernel-ksu-susfs.zip ./*
        cd ..

    - name: Upload kernel zip
      uses: actions/upload-artifact@v4
      with:
        name: Creek-Kernel-KSU-SUSFS
        path: kernel-ksu-susfs.zip
