name: Build Creek Kernel - Full (KSU + SUSFS + AK3)
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        ref: creek-v-oss

    - name: Cache toolchain
      id: cache-toolchain
      uses: actions/cache@v3
      with:
        path: toolchain
        key: toolchain-clang17

    - name: Install tools
      run: |
        sudo apt update && sudo apt install -y \
          git make bc bison flex libssl-dev \
          build-essential wget zip python3 \
          libelf-dev libc6-dev binutils

    - name: Download Clang
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        mkdir -p toolchain && cd toolchain
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        tar -xf clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        mv clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04 clang

    - name: Integrate KernelSU-Next
      run: |
        git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
        cd KernelSU-Next
        if [ -f ksu_setup.sh ]; then
          bash ksu_setup.sh ${{ github.workspace }}
        else
          cp -r kernel/fs/* ${{ github.workspace }}/fs/ 2>/dev/null || true
          cp -r kernel/security/* ${{ github.workspace }}/security/ 2>/dev/null || true
          cp -r kernel/drivers/* ${{ github.workspace }}/drivers/ 2>/dev/null || true
        fi

    - name: Get SUSFS
      run: git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git

    - name: Apply SUSFS patch
      run: |
        cd susfs4ksu
        PATCH=""
        [ -f kernel_patches/5.15/0001-susfs.patch ] && PATCH="kernel_patches/5.15/0001-susfs.patch"
        [ -f kernel_patches/5.10/0001-susfs.patch ] && PATCH="kernel_patches/5.10/0001-susfs.patch"
        if [ -n "$PATCH" ]; then
          patch -p1 -d ${{ github.workspace }} < $PATCH || echo "SUSFS patch failed, continuing..."
        fi

    - name: Configure kernel
      run: |
        export PATH="${{ github.workspace }}/toolchain/clang/bin:$PATH"
        # Cek defconfig yang tersedia
        echo "=== Available defconfigs ==="
        ls arch/arm64/configs/ || true
        ls arch/arm64/configs/vendor/ 2>/dev/null || true

        # Pakai creek_GKI.config kalau ada, fallback ke gki_defconfig
        if [ -f arch/arm64/configs/vendor/creek_GKI.config ]; then
          echo "Using creek_GKI.config"
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 gki_defconfig
          cat arch/arm64/configs/vendor/creek_GKI.config >> .config
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 olddefconfig
        elif [ -f arch/arm64/configs/creek_GKI.config ]; then
          echo "Using creek_GKI.config (root)"
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 gki_defconfig
          cat arch/arm64/configs/creek_GKI.config >> .config
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 olddefconfig
        else
          echo "Fallback: gki_defconfig"
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 gki_defconfig
        fi

        # Enable KSU + SUSFS
        scripts/config --file .config -e KSU || true
        scripts/config --file .config -e KSU_SUSFS || true
        make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 olddefconfig

    - name: Build kernel
      run: |
        export PATH="${{ github.workspace }}/toolchain/clang/bin:$PATH"
        make -j1 \
             ARCH=arm64 \
             CC=clang \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             LLVM=1 \
             LLVM_IAS=1

    - name: Create AnyKernel3 zip
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp arch/arm64/boot/Image.gz AnyKernel3/ 2>/dev/null || \
        cp arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || \
        echo "WARNING: No kernel image found!"
        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
        kernel.string=Creek Kernel Neko - KSU-Next + SUSFS
        do.devicecheck=0
        do.modules=0
        do.systemless=1
        do.cleanup=1
        device.name1=creek
        block=auto
        is_slot_device=auto

        . tools/ak3-core.sh
        dump_boot
        write_boot
        EOF
        zip -r9 ../Creek-Kernel-Neko.zip ./*

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Creek-Kernel-Neko
        path: Creek-Kernel-Neko.zip
