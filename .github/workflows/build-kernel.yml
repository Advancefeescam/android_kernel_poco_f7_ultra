name: Build Creek Kernel with KSU-Next + SUSFS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y git make bc bison flex libssl-dev build-essential wget zip

    - name: Download prebuilt Clang + GCC (AOSP)
      run: |
        mkdir -p toolchain
        cd toolchain
        # Download Clang prebuilt dari AOSP
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/r522817/clang-r522817.tar.gz
        mkdir clang && tar -xf clang-r522817.tar.gz -C clang
        # Download GCC aarch64
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc
        # Set environment
        echo "Toolchain ready"

    - name: Get KernelSU-Next
      run: git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git

    - name: Get SUSFS
      run: git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git

    - name: Apply SUSFS patch
      run: |
        cd susfs4ksu
        if [ -f kernel_patches/5.15/0001-susfs.patch ]; then
          patch -p1 -d ${{ github.workspace }} < kernel_patches/5.15/0001-susfs.patch
        fi

    - name: Build kernel with creek_GKI.config
      run: |
        export PATH=${{ github.workspace }}/toolchain/clang/bin:${{ github.workspace }}/toolchain/gcc/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-android-
        export ARCH=arm64
        export CC=clang
        export LD=ld.lld
        
        # Gunakan creek_GKI.config dari folder vendor
        make ARCH=arm64 vendor/creek_GKI.config
        
        # Enable KSU dan SUSFS
        scripts/config --file .config -e KSU
        scripts/config --file .config -e KSU_SUSFS
        
        # Build kernel
        make -j$(nproc)

    - name: Create AnyKernel3 zip
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp arch/arm64/boot/Image.gz AnyKernel3/
        cd AnyKernel3
        echo 'kernel.string=Creek Kernel (Redmi 15) - KSU-Next + SUSFS' > anykernel.sh
        echo 'do.devicecheck=0' >> anykernel.sh
        echo 'do.modules=0' >> anykernel.sh
        echo 'do.systemless=1' >> anykernel.sh
        echo 'do.cleanup=1' >> anykernel.sh
        echo 'device.name1=creek' >> anykernel.sh
        echo 'block=auto' >> anykernel.sh
        echo 'is_slot_device=auto' >> anykernel.sh
        echo '' >> anykernel.sh
        echo '. tools/ak3-core.sh' >> anykernel.sh
        echo 'dump_boot' >> anykernel.sh
        echo 'write_boot' >> anykernel.sh
        zip -r9 ../Creek-Kernel-Final.zip ./*
        cd ..

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Creek-Kernel-Final
        path: Creek-Kernel-Final.zip
