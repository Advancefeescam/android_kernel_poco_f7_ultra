name: Build Redmi 15 (creek) Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y git make bc bison flex libssl-dev build-essential \
          python3 device-tree-compiler lz4 cpio zip wget curl

    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Download toolchain (Clang + GCC)
      run: |
        mkdir -p ${{ github.workspace }}/toolchain
        cd ${{ github.workspace }}/toolchain
        
        # Download Clang (alternative URL)
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        tar -xf clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        mv clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04 clang
        
        # Download GCC
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc
        
        echo "Toolchain ready"

    - name: Build kernel
      run: |
        cd ${{ github.workspace }}
        export PATH=${{ github.workspace }}/toolchain/clang/bin:${{ github.workspace }}/toolchain/gcc/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-android-
        export ARCH=arm64
        export CC=clang
        
        # Configure
        make ARCH=arm64 creek_GKI-config
        
        # Build
        make ARCH=arm64 -j$(nproc)
        
        echo "Build completed"

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-Image
        path: arch/arm64/boot/Image.gz
        if-no-files-found: warn
