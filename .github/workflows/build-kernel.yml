name: Creek Kernel with KSU
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Install tools
      run: sudo apt update && sudo apt install -y git make bc wget
    - name: Get KernelSU
      run: |
        git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git
        cp -r KernelSU-Next/kernel/* .
    - name: Build
      run: |
        export ARCH=arm64
        make creek_GKI-config
        make -j2
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: kernel-ksu
        path: arch/arm64/boot/Image.gz
