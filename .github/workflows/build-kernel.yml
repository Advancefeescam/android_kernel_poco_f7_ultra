name: Build Redmi 15 (creek) Kernel with KernelSU-Next and SUSFS

on:
  workflow_dispatch:
    inputs:
      kernel_url:
        description: 'Kernel source repository URL'
        required: false
        default: 'https://github.com/MiCode/Xiaomi_Kernel_OpenSource'
        type: string
      kernel_branch:
        description: 'Kernel source branch'
        required: false
        default: 'creek-v-oss'
        type: string
      defconfig:
        description: 'Defconfig name (fragment config name)'
        required: false
        default: 'creek_GKI-config'
        type: string

env:
  KERNEL_PATH: ${{ github.workspace }}/kernel-source
  TOOLCHAIN_PATH: ${{ github.workspace }}/toolchain

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y git make bc bison flex libssl-dev build-essential \
          python3 python3-distutils device-tree-compiler lz4 cpio zip wget curl

    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.kernel_url }}
        ref: ${{ inputs.kernel_branch }}
        path: ${{ env.KERNEL_PATH }}
        fetch-depth: 1

    - name: Setup toolchain
      run: |
        mkdir -p ${{ env.TOOLCHAIN_PATH }}
        cd ${{ env.TOOLCHAIN_PATH }}
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/r522817/clang-r522817.tar.gz
        mkdir clang && tar -xf clang-r522817.tar.gz -C clang
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc

    - name: Configure kernel
      run: |
        cd ${{ env.KERNEL_PATH }}
        export PATH=${{ env.TOOLCHAIN_PATH }}/clang/bin:${{ env.TOOLCHAIN_PATH }}/gcc/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-android-
        export ARCH=arm64
        make ARCH=arm64 ${{ inputs.defconfig }}
        scripts/config --file .config -e KSU
        cp .config arch/arm64/configs/creek_full_defconfig

    - name: Build kernel
      run: |
        cd ${{ env.KERNEL_PATH }}
        export PATH=${{ env.TOOLCHAIN_PATH }}/clang/bin:${{ env.TOOLCHAIN_PATH }}/gcc/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-android-
        export ARCH=arm64
        make ARCH=arm64 LLVM=1 -j$(nproc)
        echo "Build completed"

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-Image.gz
        path: ${{ env.KERNEL_PATH }}/arch/arm64/boot/Image.gz
