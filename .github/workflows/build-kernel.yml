name: Build Creek Kernel - Merge Config
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: sudo apt update && sudo apt install -y git make bc bison flex libssl-dev build-essential wget zip

    - name: Download Clang
      run: |
        mkdir -p toolchain && cd toolchain
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        tar -xf clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        mv clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04 clang

    - name: Download GCC
      run: |
        cd toolchain
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc

    - name: Set PATH
      run: |
        echo "${{ github.workspace }}/toolchain/clang/bin" >> $GITHUB_PATH
        echo "${{ github.workspace }}/toolchain/gcc/bin" >> $GITHUB_PATH

    - name: Merge configs
      run: |
        export CROSS_COMPILE=aarch64-linux-android-
        export ARCH=arm64
        export CC=clang
        
        # Copy base GKI config
        cp arch/arm64/configs/gki_defconfig .config
        
        # Merge fragment vendor/creek_GKI.config
        cat arch/arm64/configs/vendor/creek_GKI.config >> .config
        
        # Clean up duplicates and resolve dependencies
        make ARCH=arm64 olddefconfig
        
        # Save as full defconfig
        cp .config arch/arm64/configs/creek_full_defconfig

    - name: Get KernelSU-Next
      run: git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git

    - name: Get SUSFS
      run: git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git

    - name: Apply SUSFS patch
      run: |
        cd susfs4ksu
        if [ -f kernel_patches/5.15/0001-susfs.patch ]; then
          patch -p1 -d ${{ github.workspace }} < kernel_patches/5.15/0001-susfs.patch
        fi

    - name: Build kernel
      run: |
        export CROSS_COMPILE=aarch64-linux-android-
        export ARCH=arm64
        export CC=clang
        
        # Gunakan full config yang sudah digabung
        make ARCH=arm64 creek_full_defconfig
        
        # Enable KSU dan SUSFS
        scripts/config --file .config -e KSU
        scripts/config --file .config -e KSU_SUSFS
        
        # Build
        make -j$(nproc)

    - name: Create AnyKernel3 zip
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp arch/arm64/boot/Image.gz AnyKernel3/
        cd AnyKernel3
        echo 'kernel.string=Creek Kernel - KSU-Next + SUSFS' > anykernel.sh
        echo 'do.devicecheck=0' >> anykernel.sh
        echo 'do.modules=0' >> anykernel.sh
        echo 'do.systemless=1' >> anykernel.sh
        echo 'do.cleanup=1' >> anykernel.sh
        echo 'device.name1=creek' >> anykernel.sh
        echo 'block=auto' >> anykernel.sh
        echo 'is_slot_device=auto' >> anykernel.sh
        echo '' >> anykernel.sh
        echo '. tools/ak3-core.sh' >> anykernel.sh
        echo 'dump_boot' >> anykernel.sh
        echo 'write_boot' >> anykernel.sh
        zip -r9 ../Creek-Kernel.zip ./*
        cd ..

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Creek-Kernel
        path: Creek-Kernel.zip
