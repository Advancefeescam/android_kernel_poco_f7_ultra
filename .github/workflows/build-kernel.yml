name: Build Redmi 15 (creek) Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y git make bc bison flex libssl-dev build-essential \
          python3 device-tree-compiler lz4 cpio zip wget curl

    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Download Clang toolchain
      run: |
        mkdir -p ${{ github.workspace }}/toolchain
        cd ${{ github.workspace }}/toolchain
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/r522817/clang-r522817.tar.gz
        mkdir clang && tar -xf clang-r522817.tar.gz -C clang
        echo "Clang downloaded"

    - name: Download GCC toolchain
      run: |
        cd ${{ github.workspace }}/toolchain
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc
        echo "GCC downloaded"

    - name: Build kernel
      run: |
        cd ${{ github.workspace }}
        export PATH=${{ github.workspace }}/toolchain/clang/bin:${{ github.workspace }}/toolchain/gcc/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-android-
        export ARCH=arm64
        export CC=clang
        
        # Configure kernel
        make ARCH=arm64 creek_GKI-config
        
        # Build kernel
        make ARCH=arm64 LLVM=1 -j$(nproc)
        
        echo "Build completed"

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-Image
        path: arch/arm64/boot/Image.gz
        if-no-files-found: warn
