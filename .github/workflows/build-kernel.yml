name: Build Creek Kernel - Full (KSU + SUSFS + AK3)
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Cache toolchain
      id: cache-toolchain
      uses: actions/cache@v3
      with:
        path: toolchain
        key: toolchain-clang17

    - name: Install tools
      run: sudo apt update && sudo apt install -y git make bc bison flex libssl-dev build-essential wget zip

    - name: Download Clang
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        mkdir -p toolchain && cd toolchain
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        tar -xf clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
        mv clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04 clang

    - name: Integrate KernelSU-Next
      run: |
        git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
        cd KernelSU-Next
        if [ -f ksu_setup.sh ]; then
          bash ksu_setup.sh ${{ github.workspace }}
        else
          cp -r kernel/fs/* ${{ github.workspace }}/fs/ 2>/dev/null || true
          cp -r kernel/security/* ${{ github.workspace }}/security/ 2>/dev/null || true
          cp -r kernel/drivers/* ${{ github.workspace }}/drivers/ 2>/dev/null || true
          cp -r kernel/ksu/* ${{ github.workspace }}/ksu/ 2>/dev/null || true
        fi

    - name: Get SUSFS
      run: git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git

    - name: Apply SUSFS patch
      run: |
        cd susfs4ksu
        if [ -f kernel_patches/5.15/0001-susfs.patch ]; then
          patch -p1 -d ${{ github.workspace }} < kernel_patches/5.15/0001-susfs.patch || true
        fi

    - name: Configure kernel
      run: |
        export PATH="${{ github.workspace }}/toolchain/clang/bin:$PATH"
        make ARCH=arm64 \
             CC=clang \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             LLVM=1 \
             LLVM_IAS=1 \
             gki_defconfig
        scripts/config --file .config -e KSU
        scripts/config --file .config -e KSU_SUSFS

    - name: Build kernel
      run: |
        export PATH="${{ github.workspace }}/toolchain/clang/bin:$PATH"
        make -j$(nproc) \
             ARCH=arm64 \
             CC=clang \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             LLVM=1 \
             LLVM_IAS=1

    - name: Create AnyKernel3 zip
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp arch/arm64/boot/Image.gz AnyKernel3/ 2>/dev/null || \
        cp arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true
        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
        kernel.string=Creek Kernel for Redmi 15 - KSU-Next + SUSFS
        do.devicecheck=0
        do.modules=0
        do.systemless=1
        do.cleanup=1
        device.name1=creek
        block=auto
        is_slot_device=auto

        . tools/ak3-core.sh
        dump_boot
        write_boot
        EOF
        zip -r9 ../Creek-Kernel-Full.zip ./*

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Creek-Kernel-Full
        path: Creek-Kernel-Full.zip      run: |
        git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
        cd KernelSU-Next
        # Gunakan script resmi jika ada
        if [ -f ksu_setup.sh ]; then
          bash ksu_setup.sh ${{ github.workspace }}
        else
          # Method manual yang aman: hanya copy file yang diperlukan
          cp -r kernel/fs/* ${{ github.workspace }}/fs/ 2>/dev/null || true
          cp -r kernel/security/* ${{ github.workspace }}/security/ 2>/dev/null || true
          cp -r kernel/drivers/* ${{ github.workspace }}/drivers/ 2>/dev/null || true
          cp -r kernel/ksu/* ${{ github.workspace }}/ksu/ 2>/dev/null || true
        fi

    - name: Get SUSFS
      run: git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git

    - name: Apply SUSFS patch
      run: |
        cd susfs4ksu
        if [ -f kernel_patches/5.15/0001-susfs.patch ]; then
          patch -p1 -d ${{ github.workspace }} < kernel_patches/5.15/0001-susfs.patch || true
        fi

    - name: Configure kernel
      run: |
        make gki_defconfig
        scripts/config --file .config -e KSU
        scripts/config --file .config -e KSU_SUSFS

    - name: Build kernel
      run: make -j$(nproc)

    - name: Create AnyKernel3 zip
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp arch/arm64/boot/Image.gz AnyKernel3/
        cd AnyKernel3
        echo 'kernel.string=Creek Kernel for Redmi 15 - KSU-Next + SUSFS' > anykernel.sh
        echo 'do.devicecheck=0' >> anykernel.sh
        echo 'do.modules=0' >> anykernel.sh
        echo 'do.systemless=1' >> anykernel.sh
        echo 'do.cleanup=1' >> anykernel.sh
        echo 'device.name1=creek' >> anykernel.sh
        echo 'block=auto' >> anykernel.sh
        echo 'is_slot_device=auto' >> anykernel.sh
        echo '' >> anykernel.sh
        echo '. tools/ak3-core.sh' >> anykernel.sh
        echo 'dump_boot' >> anykernel.sh
        echo 'write_boot' >> anykernel.sh
        zip -r9 ../Creek-Kernel-Full.zip ./*
        cd ..

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Creek-Kernel-Full
        path: Creek-Kernel-Full.zip
