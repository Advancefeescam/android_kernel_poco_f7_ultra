name: Build Redmi 15 (creek) Kernel with KernelSU-Next & SUSFS

on:
  workflow_dispatch:
    inputs:
      kernel_url:
        description: '🔗 Kernel source repository URL'
        required: false
        default: 'https://github.com/MiCode/Xiaomi_Kernel_OpenSource'
        type: string
      kernel_branch:
        description: '🌿 Kernel source branch'
        required: false
        default: 'creek-v-oss'
        type: string
      defconfig:
        description: '⚙️ Defconfig name (fragment config name)'
        required: false
        default: 'creek_GKI-config'
        type: string
      ksun_branch:
        description: '🌱 KernelSU-Next branch'
        required: false
        default: 'main'
        type: choice
        options:
          - main
          - v3.1.0
      use_anykernel3:
        description: '📦 Package as AnyKernel3 ZIP?'
        required: false
        default: true
        type: boolean

env:
  KERNEL_PATH: ${{ github.workspace }}/kernel-source
  TOOLCHAIN_PATH: ${{ github.workspace }}/toolchain
  KSU_NEXT_REPO: 'https://github.com/KernelSU-Next/KernelSU-Next.git'
  SUSFS_REPO: 'https://gitlab.com/simonpunk/susfs4ksu.git'
  ANYKERNEL3_REPO: 'https://github.com/osm0sis/AnyKernel3'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    # ============================================
    # 1. Setup Environment
    # ============================================
    - name: 🧹 Optimize runner and install tools
      run: |
        sudo apt update
        sudo apt install -y git make bc bison flex libssl-dev build-essential \
          python3 python3-distutils device-tree-compiler lz4 cpio zip wget curl
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL

    - name: 🔧 Create working directories
      run: |
        mkdir -p ${{ env.KERNEL_PATH }}
        mkdir -p ${{ env.TOOLCHAIN_PATH }}

    # ============================================
    # 2. Download Kernel Source
    # ============================================
    - name: 📥 Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.kernel_url }}
        ref: ${{ inputs.kernel_branch }}
        path: ${{ env.KERNEL_PATH }}
        fetch-depth: 1

    # ============================================
    # 3. Download Toolchains (Clang + GCC)
    # ============================================
    - name: 🔨 Download Clang (AOSP r522817 - Android 14/15/16 compatible)
      run: |
        cd ${{ env.TOOLCHAIN_PATH }}
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/r522817/clang-r522817.tar.gz
        mkdir clang
        tar -xf clang-r522817.tar.gz -C clang

    - name: 🔨 Download GCC (aarch64-linux-android-4.9)
      run: |
        cd ${{ env.TOOLCHAIN_PATH }}
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc

    - name: 🔨 Download GCC ARM32 (arm-linux-androideabi-4.9)
      run: |
        cd ${{ env.TOOLCHAIN_PATH }}
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32

    # ============================================
    # 4. Prepare Config (Merge Fragment + Base GKI)
    # ============================================
    - name: 🔧 Merge fragment config to full defconfig
      run: |
        cd ${{ env.KERNEL_PATH }}
        
        # Base GKI defconfig for kernel 5.15
        if [ -f arch/arm64/configs/gki_defconfig ]; then
          cp arch/arm64/configs/gki_defconfig arch/arm64/configs/creek_full_defconfig
        else
          # Fallback: create minimal base
          echo "CONFIG_ARCH_BENGAL=y" > arch/arm64/configs/creek_full_defconfig
        fi
        
        # Merge fragment config
        if [ -f arch/arm64/configs/${{ inputs.defconfig }} ]; then
          cat arch/arm64/configs/${{ inputs.defconfig }} >> arch/arm64/configs/creek_full_defconfig
        else
          echo "⚠️ Fragment config ${{ inputs.defconfig }} not found, using base only"
        fi
        
        # Remove duplicate lines
        sort -u arch/arm64/configs/creek_full_defconfig > arch/arm64/configs/creek_full_defconfig.tmp
        mv arch/arm64/configs/creek_full_defconfig.tmp arch/arm64/configs/creek_full_defconfig

    # ============================================
    # 5. Integrate KernelSU-Next (ReSukiSU)
    # ============================================
    - name: 🌱 Integrate KernelSU-Next
      run: |
        cd ${{ env.KERNEL_PATH }}
        echo "::group::Integrating KernelSU-Next"
        
        # Clone KernelSU-Next
        git clone --depth=1 -b ${{ inputs.ksun_branch }} ${{ env.KSU_NEXT_REPO }} KernelSU-Next
        
        # Run KernelSU-Next init script
        if [ -f KernelSU-Next/tools/init_kernelsu.sh ]; then
          bash KernelSU-Next/tools/init_kernelsu.sh $(pwd)
        else
          # Manual symlink for GKI
          ln -sf $(pwd)/KernelSU-Next/kernel .
        fi
        
        echo "KernelSU-Next integrated successfully"
        echo "::endgroup::"

    # ============================================
    # 6. Integrate SUSFS (Root Hiding)
    # ============================================
    - name: 🔒 Integrate SUSFS
      run: |
        cd ${{ env.KERNEL_PATH }}
        echo "::group::Integrating SUSFS"
        
        # Clone SUSFS
        git clone --depth=1 ${{ env.SUSFS_REPO }} susfs4ksu
        
        # Find kernel version
        KERNEL_VER=$(make kernelversion 2>/dev/null || echo "5.15")
        SUSFS_DIR="susfs4ksu/kernel_patches"
        
        # Apply SUSFS patches based on kernel version
        if [ -d "$SUSFS_DIR/$KERNEL_VER" ]; then
          for patch in $(ls $SUSFS_DIR/$KERNEL_VER/*.patch 2>/dev/null); do
            echo "Applying patch: $patch"
            patch -p1 -N -r - < "$patch" || echo "⚠️ Patch may already be applied"
          done
        elif [ -d "$SUSFS_DIR/5.15" ]; then
          for patch in $(ls $SUSFS_DIR/5.15/*.patch 2>/dev/null); do
            echo "Applying patch: $patch"
            patch -p1 -N -r - < "$patch" || echo "⚠️ Patch may already be applied"
          done
        fi
        
        echo "SUSFS integration completed"
        echo "::endgroup::"

    # ============================================
    # 7. Configure Kernel (Enable KSU & SUSFS)
    # ============================================
    - name: ⚙️ Configure kernel
      run: |
        cd ${{ env.KERNEL_PATH }}
        
        export PATH=${{ env.TOOLCHAIN_PATH }}/clang/bin:${{ env.TOOLCHAIN_PATH }}/gcc/bin:${{ env.TOOLCHAIN_PATH }}/gcc32/bin:$PATH
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export ARCH=arm64
        
        # Generate .config
        make O=out ARCH=arm64 creek_full_defconfig
        
        # Enable KernelSU config
        scripts/config --file out/.config -e KSU
        
        # Enable SUSFS configs
        scripts/config --file out/.config -e KSU_SUSFS
        scripts/config --file out/.config -e KSU_SUSFS_HAS_MAGIC_MOUNT
        scripts/config --file out/.config -e KSU_SUSFS_SUS_PATH
        scripts/config --file out/.config -e KSU_SUSFS_SUS_MOUNT
        scripts/config --file out/.config -e KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
        scripts/config --file out/.config -e KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
        scripts/config --file out/.config -e KSU_SUSFS_SUS_KSTAT
        scripts/config --file out/.config -e KSU_SUSFS_TRY_UMOUNT
        scripts/config --file out/.config -e KSU_SUSFS_SPOOF_UNAME
        scripts/config --file out/.config -e KSU_SUSFS_ENABLE_LOG
        scripts/config --file out/.config -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
        scripts/config --file out/.config -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
        scripts/config --file out/.config -e KSU_SUSFS_OPEN_REDIRECT
        
        # Optional: Performance optimization
        scripts/config --file out/.config -e CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
        scripts/config --file out/.config --set-val CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE y
        scripts/config --file out/.config --set-val CONFIG_CC_OPTIMIZE_FOR_SIZE n
        
        echo "Final kernel configuration:"
        cat out/.config | grep -E "(KSU|SUSFS)" | sort
        
        # Save final config
        cp out/.config arch/arm64/configs/creek_full_defconfig

    # ============================================
    # 8. Build Kernel
    # ============================================
    - name: 🏗️ Build kernel
      run: |
        cd ${{ env.KERNEL_PATH }}
        
        export PATH=${{ env.TOOLCHAIN_PATH }}/clang/bin:${{ env.TOOLCHAIN_PATH }}/gcc/bin:${{ env.TOOLCHAIN_PATH }}/gcc32/bin:$PATH
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export ARCH=arm64
        
        # Build with LLVM
        make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 -j$(nproc) 2>&1 | tee build.log
        
        # Check if build succeeded
        if [ ! -f out/arch/arm64/boot/Image.gz ]; then
          echo "❌ Build failed: Image.gz not found!"
          echo "Last 100 lines of build log:"
          tail -100 build.log
          exit 1
        fi
        
        echo "✅ Build successful!"
        ls -la out/arch/arm64/boot/

    # ============================================
    # 9. Prepare AnyKernel3 Package
    # ============================================
    - name: 📦 Prepare AnyKernel3 package
      if: inputs.use_anykernel3 == true
      run: |
        # Clone AnyKernel3 template
        git clone --depth=1 ${{ env.ANYKERNEL3_REPO }} AnyKernel3
        
        # Copy kernel image
        cp ${{ env.KERNEL_PATH }}/out/arch/arm64/boot/Image.gz AnyKernel3/
        
        # Copy dtb/dtbo if available
        if [ -f ${{ env.KERNEL_PATH }}/out/arch/arm64/boot/dtbo.img ]; then
          cp ${{ env.KERNEL_PATH }}/out/arch/arm64/boot/dtbo.img AnyKernel3/
        fi
        if [ -f ${{ env.KERNEL_PATH }}/out/arch/arm64/boot/dtb.img ]; then
          cp ${{ env.KERNEL_PATH }}/out/arch/arm64/boot/dtb.img AnyKernel3/
        fi
        
        # Create custom anykernel.sh for creek
        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
# AnyKernel3 Ramdisk Mod Script
# osm0sis @ xda-developers

## AnyKernel setup
# begin properties
properties() { '
kernel.string=Custom Kernel for Redmi 15 (creek) - KernelSU-Next + SUSFS
do.devicecheck=0
do.modules=0
do.systemless=1
do.cleanup=1
do.cleanuponabort=0
device.name1=creek
device.name2=redmi15
device.name3=Redmi15
supported.versions=
supported.patchlevels=
'; } # end properties

# shell variables
block=auto;
is_slot_device=auto;
ramdisk_compression=auto;

## AnyKernel methods (DO NOT CHANGE)
# import patching functions/variables - see for reference
. tools/ak3-core.sh;

## AnyKernel install
# dump boot and vendor boot
dump_boot;

# flash kernel
write_boot;

# flash dtb if present
if [ -f $home/dtb ]; then
  flash_dtb;
fi;

# end install
EOF
        
        # Create ZIP
        zip -r9 ../creek-ksu-susfs-anykernel3.zip ./*
        cd ..

    # ============================================
    # 10. Upload Artifacts
    # ============================================
    - name: 📤 Upload AnyKernel3 ZIP
      if: inputs.use_anykernel3 == true
      uses: actions/upload-artifact@v4
      with:
        name: creek-kernel-ksu-susfs-anykernel3
        path: creek-ksu-susfs-anykernel3.zip
        if-no-files-found: error

    - name: 📤 Upload boot image (raw)
      uses: actions/upload-artifact@v4
      with:
        name: creek-boot-image-raw
        path: ${{ env.KERNEL_PATH }}/out/arch/arm64/boot/Image.gz
        if-no-files-found: warn
